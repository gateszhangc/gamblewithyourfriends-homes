<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="120" rx="16" fill="url(#bg)"/>
  <!-- Dice icon -->
  <g transform="translate(24, 28)">
    <rect x="0" y="0" width="64" height="64" rx="12" fill="url(#gold)" stroke="#B8860B" stroke-width="2"/>
    <circle cx="16" cy="16" r="5" fill="#1a0a2e"/>
    <circle cx="48" cy="16" r="5" fill="#1a0a2e"/>
    <circle cx="16" cy="48" r="5" fill="#1a0a2e"/>
    <circle cx="48" cy="48" r="5" fill="#1a0a2e"/>
    <circle cx="32" cy="32" r="5" fill="#1a0a2e"/>
    <circle cx="16" cy="32" r="5" fill="#1a0a2e"/>
    <circle cx="48" cy="32" r="5" fill="#1a0a2e"/>
  </g>
  <!-- Text -->
  <text x="110" y="52" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FFD700">GAMBLE</text>
  <text x="110" y="82" font-family="Georgia, serif" font-size="16" fill="#e0e0e0">WITH YOUR</text>
  <text x="110" y="104" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FFD700">FRIENDS</text>
  <!-- Cards -->
  <g transform="translate(310, 32)">
    <rect x="0" y="0" width="28" height="40" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
    <text x="6" y="16" font-family="serif" font-size="12" fill="white" font-weight="bold">K</text>
    <text x="6" y="34" font-family="serif" font-size="10" fill="white">e</text>
    <rect x="14" y="8" width="28" height="40" rx="4" fill="#2c3e50" stroke="#1a252f" stroke-width="1.5"/>
    <text x="20" y="24" font-family="serif" font-size="12" fill="white" font-weight="bold">A</text>
    <text x="20" y="42" font-family="serif" font-size="10" fill="white">`</text>
  </g>
</svg>
